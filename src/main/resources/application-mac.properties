################ MCP Client 相關設定 ################
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers-mac.json
spring.ai.mcp.client.request-timeout=60s

# Filesystem MCP 根目錄。
# 使用者可在啟動前透過環境變數覆寫此設定：
#   Terminal: export MCP_FILESYSTEM_ROOT="/Users/<your-user>/Desktop/mymcp"
#   IntelliJ Run Configuration: MCP_FILESYSTEM_ROOT=/Users/<your-user>/Desktop/mymcp
# 若未設定，預設為目前使用者的 Desktop/mymcp 目錄。
# properties 設定會在執行時覆寫 mcp-servers-mac.json 中同名的 filesystem connection；但 JSON 檔案本身不會被修改。
spring.ai.mcp.client.stdio.connections.filesystem.command=npx
spring.ai.mcp.client.stdio.connections.filesystem.args[0]=-y
spring.ai.mcp.client.stdio.connections.filesystem.args[1]=@modelcontextprotocol/server-filesystem
spring.ai.mcp.client.stdio.connections.filesystem.args[2]=${MCP_FILESYSTEM_ROOT:${user.home}/Desktop/mymcp}
